<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Welcome to my homepage</title>
  <style>
    :root {
      --bg: #111318;
      --panel: #1b1f27;
      --border: #2d3440;
      --text: #f2f4f7;
      --muted: #9ca5b4;
      --accent: #f28b3c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(920px, calc(100% - 40px));
      padding: 72px 0;
    }

    header {
      margin-bottom: 42px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 6vw, 4.5rem);
      letter-spacing: -0.05em;
      line-height: 1;
    }

    .intro {
      max-width: 560px;
      margin: 16px 0 0;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .category {
      border: 1px solid var(--border);
      background: var(--panel);
      padding: 24px;
    }

    .category-label {
      margin: 0 0 18px;
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 18px 0 0;
      border-top: 1px solid var(--border);
    }

    .item h2 {
      margin: 0;
      font-size: 1.2rem;
    }

    .item p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .button {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border: 1px solid var(--accent);
      color: var(--text);
      text-decoration: none;
      font-weight: 650;
      transition: background 0.18s ease, color 0.18s ease;
    }

    .button:hover,
    .button:focus-visible {
      background: var(--accent);
      color: #151515;
      outline: none;
    }

    @media (max-width: 600px) {
      main { padding: 48px 0; }

      .item {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Welcome to my homepage</h1>
      <p class="intro">A small collection of project notes and documentation.</p>
    </header>

    <section class="category" aria-labelledby="documentation-title">
      <p class="category-label">Category</p>
      <div class="item">
        <div>
          <h2 id="documentation-title">Documentations</h2>
          <p>Theme Manager documentation for Unity UGUI.</p>
        </div>
        <a class="button" href="ThemeManager/ThemeManager.html">ThemeManager</a>
      </div>
    </section>
  </main>
</body>
</html>
