<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Welcome to my homepage</title>
  <style>
    :root {
      --bg: #111318;
      --panel: #1b1f27;
      --border: #2d3440;
      --text: #f2f4f7;
      --accent: #f28b3c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(920px, calc(100% - 40px));
      padding: 72px 0;
    }

    header {
      margin-bottom: 42px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 6vw, 4.5rem);
      letter-spacing: -0.05em;
      line-height: 1;
    }

    .category {
      border: 1px solid var(--border);
      background: var(--panel);
      padding: 24px;
    }

    .item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .item h2 {
      margin: 0;
      font-size: 1.25rem;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border: 1px solid var(--accent);
      color: var(--text);
      text-decoration: none;
      font-weight: 650;
      transition: background 0.18s ease, color 0.18s ease;
    }

    .button:hover,
    .button:focus-visible {
      background: var(--accent);
      color: #151515;
      outline: none;
    }

    @media (max-width: 600px) {
      main { padding: 48px 0; }

      .item {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Welcome to my homepage</h1>
    </header>

    <section class="category" aria-labelledby="theme-manager-title">
      <div class="item">
        <h2 id="theme-manager-title">Theme Manager</h2>

        <div class="buttons">
          <a class="button" href="ThemeManager/ThemeManager.html">Documentation</a>
          <a class="button" href="ThemeManager/Changelog.md">Changelog</a>
          <a class="button" href="https://play.unity.com/en/games/29a7d135-713e-4504-b5e7-5812aab71f63/theme-manager-demo" target="_blank" rel="noopener noreferrer">Play Demo</a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
